category: "password-cracking"
description: "Hash cracking and password attacks"
commands:
  - name: "hashcat-ntlm"
    description: "Crack NTLM hashes with hashcat"
    command: "hashcat -m 1000 {HASHES_FILE} /usr/share/wordlists/rockyou.txt --force"
    tool: "hashcat"
    tags: ["crack", "ntlm", "hashcat"]
    os: "any"
    exam: ["oscp", "cpts"]

  - name: "hashcat-ntlmv2"
    description: "Crack NTLMv2 hashes (NetNTLMv2)"
    command: "hashcat -m 5600 {HASHES_FILE} /usr/share/wordlists/rockyou.txt --force"
    tool: "hashcat"
    tags: ["crack", "ntlmv2", "hashcat"]
    os: "any"
    exam: ["oscp", "cpts"]

  - name: "hashcat-kerberoast"
    description: "Crack Kerberoast TGS hashes"
    command: "hashcat -m 13100 {HASHES_FILE} /usr/share/wordlists/rockyou.txt --force"
    tool: "hashcat"
    tags: ["crack", "kerberoast", "hashcat"]
    os: "any"
    exam: ["oscp", "cpts"]

  - name: "hashcat-asrep"
    description: "Crack AS-REP roast hashes with hashcat"
    command: "hashcat -m 18200 {HASHES_FILE} /usr/share/wordlists/rockyou.txt --force"
    tool: "hashcat"
    tags: ["crack", "asrep", "hashcat"]
    os: "any"
    exam: ["oscp", "cpts"]

  - name: "john-asrep"
    description: "Crack AS-REP roast hashes with John"
    command: "john {HASHES_FILE} --wordlist=/usr/share/wordlists/rockyou.txt --format=krb5asrep"
    tool: "john"
    tags: ["crack", "asrep", "john"]
    os: "any"
    exam: ["oscp", "cpts"]
    notes: "Use --format=krb5asrep for $krb5asrep$ hashes"

  - name: "hashcat-md5"
    description: "Crack MD5 hashes"
    command: "hashcat -m 0 {HASHES_FILE} /usr/share/wordlists/rockyou.txt --force"
    tool: "hashcat"
    tags: ["crack", "md5", "hashcat"]
    os: "any"
    exam: ["oscp", "cpts"]

  - name: "hashcat-sha256"
    description: "Crack SHA256 hashes"
    command: "hashcat -m 1400 {HASHES_FILE} /usr/share/wordlists/rockyou.txt --force"
    tool: "hashcat"
    tags: ["crack", "sha256", "hashcat"]
    os: "any"
    exam: ["oscp", "cpts"]

  - name: "john-default"
    description: "Crack hashes with John (auto-detect)"
    command: "john {HASHES_FILE} --wordlist=/usr/share/wordlists/rockyou.txt"
    tool: "john"
    tags: ["crack", "john"]
    os: "any"
    exam: ["oscp", "cpts"]

  - name: "john-rules"
    description: "John with rules for password mutation"
    command: "john {HASHES_FILE} --wordlist=/usr/share/wordlists/rockyou.txt --rules=best64"
    tool: "john"
    tags: ["crack", "john", "rules"]
    os: "any"
    exam: ["oscp", "cpts"]

  - name: "hydra-http-post"
    description: "HTTP POST form brute force"
    command: "hydra -l {USER} -P /usr/share/wordlists/rockyou.txt {IP} http-post-form '/login:username=^USER^&password=^PASS^:F=Invalid'"
    tool: "hydra"
    tags: ["brute", "http", "hydra", "web"]
    os: "any"
    exam: ["oscp", "cpts"]
    notes: "Adjust form parameters and failure string"

  - name: "hydra-ssh"
    description: "SSH brute force"
    command: "hydra -l {USER} -P /usr/share/wordlists/rockyou.txt ssh://{IP} -t 4"
    tool: "hydra"
    tags: ["brute", "ssh", "hydra"]
    os: "any"
    exam: ["oscp", "cpts"]

  - name: "hydra-ftp"
    description: "FTP brute force"
    command: "hydra -l {USER} -P /usr/share/wordlists/rockyou.txt ftp://{IP}"
    tool: "hydra"
    tags: ["brute", "ftp", "hydra"]
    os: "any"
    exam: ["oscp", "cpts"]

  - name: "hashid-identify"
    description: "Identify hash type"
    command: "hashid '{HASH}'"
    tool: "hashid"
    tags: ["crack", "identify", "hash"]
    os: "any"
    exam: ["oscp", "cpts"]
